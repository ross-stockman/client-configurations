name: Full Configuration Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to validate (leave empty for current)'
        required: false
        default: ''

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build validation script
        run: npm run build

      - name: Run full validation
        run: |
          npm run validate:full

      - name: Report Success
        if: success()
        run: echo "✅ Full validation passed. All configurations are compliant with the current schema and promotion rules."

      - name: Report Failure
        if: failure()
        run: echo "❌ Full validation failed. Please check the logs above for violations."
