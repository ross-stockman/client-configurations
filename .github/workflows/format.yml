name: Format Validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  format-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting of changed files
        run: |
          git fetch origin main:main
          # Get list of changed .json and .ts files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep -E '\.(json|ts)$' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No JSON or TypeScript files changed."
            exit 0
          fi
          
          echo "Checking formatting for:"
          echo "$CHANGED_FILES"
          
          # Run prettier check on changed files
          npx prettier --check $CHANGED_FILES
