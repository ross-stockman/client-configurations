name: Full Format Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to validate (leave empty for current)'
        required: false
        default: ''

jobs:
  format-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full format check
        run: |
          if ! npm run format:check; then
            echo "❌ Formatting issues found. To fix them locally, run:"
            echo "   npm run format"
            exit 1
          fi
          echo "✅ All files are correctly formatted."
