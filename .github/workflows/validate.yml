name: Client Configuration Validation

on:
  pull_request:
    branches:
      - main
    # Re-run if new changes are pushed to the branch
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git diff

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build validation script
        run: npm run build

      - name: Run validation
        id: validate
        env:
          BASE_BRANCH: origin/main
        run: |
          # Fetch the target branch to ensure it exists for diffing
          git fetch origin main:main
          
          # Run the validation script and capture output
          # Use a temporary file to capture both stdout and stderr
          npm run validate > validation_output.txt 2>&1 || VALIDATION_EXIT_CODE=$?
          
          # Output to console so it's still in the logs
          cat validation_output.txt
          
          # Prepare output for PR comment
          {
            echo "VALIDATION_LOG<<EOF"
            cat validation_output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          # Exit with the original code
          exit ${VALIDATION_EXIT_CODE:-0}

      - name: Post PR Comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const output = process.env.VALIDATION_LOG;
            const success = "${{ steps.validate.outcome }}" === "success";
            const header = success ? "### ✅ Validation Passed" : "### ❌ Validation Failed";
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${header}\n\n\`\`\`plaintext\n${output}\n\`\`\``
            });
        env:
          VALIDATION_LOG: ${{ steps.validate.outputs.VALIDATION_LOG }}
